name: Deploy Staging WC26 Prediction

on:
  push:
    branches:
      - staging

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove local-only files from deploy payload
        run: |
          rm -rf .git
          rm -f .env
          rm -f prisma/dev.db
          rm -f prisma/dev.db-journal
          rm -f prisma/dev.db-wal
          rm -f prisma/dev.db-shm

      - name: Ensure server directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/wc26_prediction/main

      - name: Copy repository to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/wc26_prediction/main"
          overwrite: true

      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            cd /home/ubuntu/wc26_prediction/main

            echo "================================="
            echo "Current directory:"
            pwd
            echo "================================="

            if [ ! -f .env ]; then
              echo "ERROR: .env file is missing at /home/ubuntu/wc26_prediction/main/.env"
              echo "Create it on the server before deploying."
              exit 1
            fi

            echo ""
            echo "Server resources before deploy:"
            free -h || true
            df -h / || true
            docker version || true

            echo ""
            echo "Docker compose configuration:"
            docker compose -p main config

            echo ""
            echo "Stopping only wc26 staging containers..."
            docker compose -p main down --remove-orphans || true

            echo ""
            echo "Removing stopped wc26 staging containers..."
            docker compose -p main rm -f || true

            echo ""
            echo "Cleaning unused Docker resources and build cache..."
            docker system prune -af || true

            echo ""
            echo "Building Docker image..."
            DOCKER_BUILDKIT=1 BUILDKIT_PROGRESS=plain docker compose -p main build --pull --progress=plain

            echo ""
            echo "Starting fresh wc26 staging containers..."
            docker compose -p main up -d --force-recreate --remove-orphans

            echo ""
            echo "Waiting for startup..."
            sleep 20

            echo ""
            echo "Compose status:"
            docker compose -p main ps

            echo ""
            echo "Recent container logs:"
            docker compose -p main logs --tail=80

            echo ""
            echo "Running containers:"
            docker ps

            echo ""
            echo "Deployment successful."
