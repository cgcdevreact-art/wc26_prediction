name: Deploy Staging WC26 Prediction

on:
  push:
    branches:
      - staging

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY_stagging: ${{ secrets.SERVER_SSH_KEY_stagging }}
      SERVER_DIR: /home/ubuntu/wc26_prediction/staging
      LEGACY_DIR: /home/ubuntu/wc26_prediction/main
      BACKUP_DIR: /home/ubuntu/wc26_prediction/backups
      COMPOSE_PROJECT: wc26-staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          set -e

          if [ -z "$SERVER_HOST" ]; then
            echo "::error::SERVER_HOST secret is missing."
            exit 1
          fi

          if [ -z "$SERVER_USER" ]; then
            echo "::error::SERVER_USER secret is missing."
            exit 1
          fi

          if [ -z "$SERVER_SSH_KEY_stagging" ]; then
            echo "::error::SERVER_SSH_KEY_stagging secret is missing."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s' "$SERVER_SSH_KEY_stagging" | sed 's/\\n/\n/g; s/\r$//' > ~/.ssh/wc26_staging_key
          chmod 600 ~/.ssh/wc26_staging_key

          if ! grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/wc26_staging_key; then
            echo "::error::SERVER_SSH_KEY_stagging does not look like a private key. Paste the full private key, including BEGIN/END lines."
            exit 1
          fi

          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host wc26-staging-server
            HostName $SERVER_HOST
            User $SERVER_USER
            IdentityFile ~/.ssh/wc26_staging_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            ServerAliveInterval 30
          EOF

          ssh -o BatchMode=yes wc26-staging-server "echo SSH authentication OK"

      - name: Remove local-only files from deploy payload
        run: |
          rm -rf .git
          rm -f .env
          rm -f prisma/dev.db
          rm -f prisma/dev.db-journal
          rm -f prisma/dev.db-wal
          rm -f prisma/dev.db-shm

      - name: Ensure server directory exists
        run: |
          set -e

          ssh wc26-staging-server "
            set -e
            mkdir -p '$SERVER_DIR'
            mkdir -p '$SERVER_DIR/prisma'
            mkdir -p '$BACKUP_DIR'

            if [ ! -f '$SERVER_DIR/.env' ] && [ -f '$LEGACY_DIR/.env' ]; then
              cp '$LEGACY_DIR/.env' '$SERVER_DIR/.env'
              echo 'Copied existing .env from legacy main path to staging.'
            fi
          "

      - name: Backup server database before file sync
        run: |
          set -e

          ssh wc26-staging-server "
            set -e
            cd '$SERVER_DIR'

            if [ -f prisma/dev.db ]; then
              backup='$BACKUP_DIR/dev-before-sync-'\"\$(date +%Y%m%d-%H%M%S)\"'.db'
              cp prisma/dev.db \"\$backup\"
              echo \"SQLite DB backup created before sync: \$backup\"
            else
              echo 'No existing staging prisma/dev.db found before sync.'
            fi
          "

      - name: Copy repository to server
        run: |
          set -e

          tar \
            --exclude='./.env' \
            --exclude='./.git' \
            --exclude='./prisma/dev.db' \
            --exclude='./prisma/dev.db-journal' \
            --exclude='./prisma/dev.db-wal' \
            --exclude='./prisma/dev.db-shm' \
            -czf - . | ssh wc26-staging-server "tar -xzf - -C '$SERVER_DIR'"

      - name: Deploy application
        run: |
          set -e

          ssh wc26-staging-server "
            set -e

            cd '$SERVER_DIR'

            echo '================================='
            echo 'Current directory:'
            pwd
            echo '================================='

            if [ ! -f .env ]; then
              echo 'ERROR: .env file is missing at $SERVER_DIR/.env'
              echo 'Create it on the server before deploying.'
              exit 1
            fi

            echo ''
            echo 'Server resources before deploy:'
            free -h || true
            df -h / || true
            docker version || true

            echo ''
            echo 'Docker compose configuration:'
            docker compose -p '$COMPOSE_PROJECT' config

            echo ''
            echo 'Stopping legacy manually-created staging container if it exists...'
            docker stop wc26_prediction_app || true

            echo ''
            echo 'Migrating existing SQLite DB from old main path on first staging deploy...'
            mkdir -p prisma
            if [ ! -f prisma/dev.db ] && [ -f '$LEGACY_DIR/prisma/dev.db' ]; then
              cp '$LEGACY_DIR/prisma/dev.db' prisma/dev.db
              echo 'Copied existing SQLite DB from legacy main path to staging after stopping legacy container.'
            else
              echo 'Staging DB already exists, or no legacy DB exists. No DB migration needed.'
            fi

            echo ''
            echo 'Stopping only wc26 staging containers...'
            docker compose -p '$COMPOSE_PROJECT' stop app || true

            echo ''
            echo 'Backing up SQLite DB after app stop...'
            mkdir -p '$BACKUP_DIR'
            if [ -f prisma/dev.db ]; then
              backup='$BACKUP_DIR/dev-after-stop-'\"\$(date +%Y%m%d-%H%M%S)\"'.db'
              cp prisma/dev.db \"\$backup\"
              echo \"SQLite DB backup created after app stop: \$backup\"
            else
              echo 'No existing prisma/dev.db found after app stop. Fresh DB will be created on startup.'
            fi

            echo ''
            echo 'Removing only wc26 staging containers...'
            docker compose -p '$COMPOSE_PROJECT' down --remove-orphans || true

            echo ''
            echo 'Removing legacy manually-created staging container if it exists...'
            docker rm -f wc26_prediction_app || true

            echo ''
            echo 'Removing stopped wc26 staging containers...'
            docker compose -p '$COMPOSE_PROJECT' rm -f || true

            echo ''
            echo 'Cleaning unused Docker resources and build cache...'
            docker system prune -af || true

            echo ''
            echo 'Building Docker image...'
            DOCKER_BUILDKIT=1 BUILDKIT_PROGRESS=plain docker compose -p '$COMPOSE_PROJECT' build --pull --progress=plain

            echo ''
            echo 'Starting fresh wc26 staging containers...'
            docker compose -p '$COMPOSE_PROJECT' up -d --force-recreate --remove-orphans

            echo ''
            echo 'Waiting for startup...'
            sleep 20

            echo ''
            echo 'Compose status:'
            docker compose -p '$COMPOSE_PROJECT' ps

            echo ''
            echo 'Recent container logs:'
            docker compose -p '$COMPOSE_PROJECT' logs --tail=80

            echo ''
            echo 'Running containers:'
            docker ps

            echo ''
            echo 'Deployment successful.'
          "
