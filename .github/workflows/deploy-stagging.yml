name: Deploy Staging WC26 Prediction

on:
  push:
    branches:
      - staging

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove local-only files from deploy payload
        run: |
          rm -rf .git
          rm -f .env
          rm -f prisma/dev.db
          rm -f prisma/dev.db-journal
          rm -f prisma/dev.db-wal
          rm -f prisma/dev.db-shm

      - name: Ensure server directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/wc26_prediction/staging
            mkdir -p /home/ubuntu/wc26_prediction/staging/prisma
            mkdir -p /home/ubuntu/wc26_prediction/backups

            if [ ! -f /home/ubuntu/wc26_prediction/staging/.env ] && [ -f /home/ubuntu/wc26_prediction/main/.env ]; then
              cp /home/ubuntu/wc26_prediction/main/.env /home/ubuntu/wc26_prediction/staging/.env
              echo "Copied existing .env from main to staging."
            fi

      - name: Backup server database before file sync
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/wc26_prediction/staging

            if [ -f prisma/dev.db ]; then
              backup="/home/ubuntu/wc26_prediction/backups/dev-before-sync-$(date +%Y%m%d-%H%M%S).db"
              cp prisma/dev.db "$backup"
              echo "SQLite DB backup created before sync: $backup"
            else
              echo "No existing prisma/dev.db found before sync. Fresh DB will be created on startup."
            fi

      - name: Copy repository to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/wc26_prediction/staging"
          overwrite: true

      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            cd /home/ubuntu/wc26_prediction/staging

            echo "================================="
            echo "Current directory:"
            pwd
            echo "================================="

            if [ ! -f .env ]; then
              echo "ERROR: .env file is missing at /home/ubuntu/wc26_prediction/staging/.env"
              echo "Create it on the server before deploying."
              exit 1
            fi

            echo ""
            echo "Server resources before deploy:"
            free -h || true
            df -h / || true
            docker version || true

            echo ""
            echo "Docker compose configuration:"
            docker compose -p wc26-staging config

            echo ""
            echo "Stopping legacy manually-created staging container if it exists..."
            docker stop wc26_prediction_app || true

            echo ""
            echo "Migrating existing SQLite DB from old main path on first staging deploy..."
            mkdir -p prisma
            if [ ! -f prisma/dev.db ] && [ -f /home/ubuntu/wc26_prediction/main/prisma/dev.db ]; then
              cp /home/ubuntu/wc26_prediction/main/prisma/dev.db prisma/dev.db
              echo "Copied existing SQLite DB from main to staging after stopping legacy container."
            else
              echo "Staging DB already exists, or no legacy DB exists. No DB migration needed."
            fi

            echo ""
            echo "Stopping only wc26 staging containers..."
            docker compose -p wc26-staging stop app || true

            echo ""
            echo "Backing up SQLite DB after app stop..."
            mkdir -p /home/ubuntu/wc26_prediction/backups
            if [ -f prisma/dev.db ]; then
              backup="/home/ubuntu/wc26_prediction/backups/dev-after-stop-$(date +%Y%m%d-%H%M%S).db"
              cp prisma/dev.db "$backup"
              echo "SQLite DB backup created after app stop: $backup"
            else
              echo "No existing prisma/dev.db found after app stop. Fresh DB will be created on startup."
            fi

            echo ""
            echo "Removing only wc26 staging containers..."
            docker compose -p wc26-staging down --remove-orphans || true

            echo ""
            echo "Removing legacy manually-created staging container if it exists..."
            docker rm -f wc26_prediction_app || true

            echo ""
            echo "Removing stopped wc26 staging containers..."
            docker compose -p wc26-staging rm -f || true

            echo ""
            echo "Cleaning unused Docker resources and build cache..."
            docker system prune -af || true

            echo ""
            echo "Building Docker image..."
            DOCKER_BUILDKIT=1 BUILDKIT_PROGRESS=plain docker compose -p wc26-staging build --pull --progress=plain

            echo ""
            echo "Starting fresh wc26 staging containers..."
            docker compose -p wc26-staging up -d --force-recreate --remove-orphans

            echo ""
            echo "Waiting for startup..."
            sleep 20

            echo ""
            echo "Compose status:"
            docker compose -p wc26-staging ps

            echo ""
            echo "Recent container logs:"
            docker compose -p wc26-staging logs --tail=80

            echo ""
            echo "Running containers:"
            docker ps

            echo ""
            echo "Deployment successful."
